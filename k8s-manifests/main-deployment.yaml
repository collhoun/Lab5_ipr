apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-deployment
  namespace: lab5
  labels:
    app: main
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
        version: v1
    spec:
       containers:
       - name: main
         image: my-calculator:v1
         imagePullPolicy: IfNotPresent
         stdin: true  # Открывает стандартный поток ввода
         tty: true    # Эмулирует термина
         ports:
         - containerPort: 5000
         env:
      # Берем значение из ConfigMap
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: calc-config
                key: APP_PORT
      # Берем значение из Secret
          - name: SECRET_TOKEN
            valueFrom:
              secretKeyRef:
                name: calc-secrets
                key: API_KEY